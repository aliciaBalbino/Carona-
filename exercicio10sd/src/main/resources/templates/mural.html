<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mural de Caronas Profissional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background-color: #f4f7f6; }
        .mural-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #2980b9; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .back-link { display: block; margin-top: 20px; text-align: center; color: #2980b9; text-decoration: none; }
        .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 14px; margin-left: 5px; }
        .btn-delete:hover {background: #c0392b;}

            .btn-edit { background: #f39c12; color: white; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 14px; }
            .btn-edit:hover { background: #d35400; }

    </style>
</head>
<body>

<div class="mural-container">
<h1>🚗 Mural de Caronas Disponíveis </h1>
     <table>
         <thead>
         <tr>
            <th>Motorista</th>
             <th>Destino</th>
             <th>Ações</th>
         </tr>
         </thead>
         <tbody>
         <tr th:each="c : ${caronas}">
             <td th:text="${c.motorista}"> Nome</td>
             <td th:text="${c.destino}">Destino</td>
             <td>
                 <a th:href="@{/(id=${c.id})}" class="btn-edit">Editar</a>
                 <a th:href="@{/deletar/{id}(id=${c.id})}" class="btn-delete"
                    onclick="return confirm('Excluir esta carona?')">Excluir</a>
             </td>

         </tr>
         </tbody>
         </table>
         <a href="/" class="back-link">🠔 Voltar para a página de cadastro</a>
</div>
</body>
</html>
