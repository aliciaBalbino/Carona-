<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mural de Caronas Profissional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background-color: #f4f7f6; }
        .mural-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #2980b9; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .back-link { display: block; margin-top: 20px; text-align: center; color: #2980b9; text-decoration: none; }
    </style>
</head>
<body>

<div class="mural-container"
<h1>🚗 Mural de caronas disponíveis </h1>
     <table>
         <thead>
         <tr>
            <th>Motorista</th>
             <th>Destino</th>
         </tr>
         </thead>
         <tbody>
         <tr th:each="c : ${caronas}">
             <td th:text="${c.motorista}"> Nome</td>
             <td th:text="${c.destino}">Destino</td>
         </tr>
         </tbody>
         </table>
         <a href="/" class="back-link">🠔 Voltar para a página de casdastro</a>
</div>
</body>
</html>
